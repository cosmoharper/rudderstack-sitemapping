<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RudderStack.com Site Map Diagram</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1e27; color: #e0e0e0; overflow: hidden; }

#controls {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(26, 30, 39, 0.97); backdrop-filter: blur(10px);
  border-bottom: 1px solid #313845; padding: 12px 20px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
#controls .logo-area { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
#controls .logo-area .site-map-label { font-size: 14px; font-weight: 600; color: #76acf7; letter-spacing: -0.3px; }
#controls .stats { font-size: 12px; color: #888; white-space: nowrap; }

#filter-badge {
  position: fixed; top: auto; bottom: auto; left: 50%; transform: translateX(-50%);
  z-index: 150; display: none; padding: 6px 16px; border-radius: 20px;
  background: #1063e2; color: #fff; font-size: 12px; font-weight: 600;
  cursor: pointer; box-shadow: 0 4px 16px rgba(16, 99, 226, 0.4);
  transition: opacity 0.2s;
}
#filter-badge:hover { background: #0b56c6; }

#search-box {
  padding: 6px 12px; border: 1px solid #3d4451; border-radius: 6px;
  background: #252a35; color: #e0e0e0; font-size: 13px; width: 260px;
  font-family: 'Inter', sans-serif;
}
#search-box:focus { outline: none; border-color: #1063e2; }

.toggle-btn {
  padding: 5px 12px; border: 1px solid #3d4451; border-radius: 6px;
  background: #252a35; color: #ccc; font-size: 12px; cursor: pointer;
  transition: all 0.2s; white-space: nowrap; font-family: 'Inter', sans-serif;
  position: relative;
}
.toggle-btn:hover { border-color: #1063e2; color: #fff; }
.toggle-btn.active { background: #1063e2; border-color: #1063e2; color: #fff; }
.toggle-btn .btn-tip {
  display: none; position: absolute; top: calc(100% + 8px); left: 50%;
  transform: translateX(-50%); z-index: 250;
  background: #1a1e27; border: 1px solid #3d4451; border-radius: 6px;
  padding: 8px 12px; font-size: 11px; line-height: 1.5; color: #ccc;
  white-space: normal; width: 220px; text-align: left;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4); pointer-events: none;
  font-weight: 400;
}
.toggle-btn .btn-tip::before {
  content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
  border-left: 5px solid transparent; border-right: 5px solid transparent;
  border-bottom: 5px solid #3d4451;
}
.toggle-btn:hover .btn-tip { display: block; }
/* Keep left-side tooltips from overflowing viewport */
.toggle-btn .btn-tip.tip-left { left: 0; transform: none; }
.toggle-btn .btn-tip.tip-left::before { left: 20px; transform: none; }
/* Keep right-side tooltips from overflowing viewport */
.toggle-btn .btn-tip.tip-right { left: auto; right: 0; transform: none; }
.toggle-btn .btn-tip.tip-right::before { left: auto; right: 20px; transform: none; }

#legend {
  position: fixed; bottom: 20px; left: 20px; z-index: 100;
  background: rgba(26, 30, 39, 0.97); backdrop-filter: blur(10px);
  border: 1px solid #313845; border-radius: 8px; padding: 14px 18px;
  font-size: 12px;
}
#legend h3 { font-size: 13px; margin-bottom: 8px; color: #1063e2; }
.legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

#tooltip {
  position: fixed; z-index: 200; pointer-events: none; display: none;
  background: rgba(30, 34, 44, 0.98); backdrop-filter: blur(10px);
  border: 1px solid #3d4451; border-radius: 8px; padding: 14px 18px;
  max-width: 480px; font-size: 12px; line-height: 1.5;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
#tooltip h4 { color: #1063e2; font-size: 14px; margin-bottom: 6px; word-break: break-all; }
#tooltip .url { color: #888; font-size: 11px; margin-bottom: 8px; word-break: break-all; }
#tooltip .cta-list { margin-top: 6px; }
#tooltip .cta-item { background: #252a35; border-left: 3px solid #f59e0b; padding: 4px 8px; margin: 3px 0; border-radius: 0 4px 4px 0; }
#tooltip .cta-item .cta-text { color: #f59e0b; font-weight: 600; }
#tooltip .cta-item .cta-target { color: #666; font-size: 10px; }
#tooltip .cta-item .cta-count { color: #76acf7; font-size: 10px; font-weight: 600; }
#tooltip .conversion-info { margin-top: 8px; padding: 6px 8px; background: #252a35; border-left: 3px solid #1063e2; border-radius: 0 4px 4px 0; }
#tooltip .form-fields { color: #76acf7; font-size: 11px; }
#tooltip .tracking-event { color: #22c55e; font-size: 11px; }

/* Modal */
#modal-overlay {
  position: fixed; inset: 0; z-index: 300; display: none;
  background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#modal-overlay.visible { display: flex; }
#modal {
  background: #252a35; border: 1px solid #3d4451; border-radius: 12px;
  width: 640px; max-height: 80vh; overflow-y: auto; padding: 0;
  box-shadow: 0 16px 60px rgba(0,0,0,0.6);
}
#modal .modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px; border-bottom: 1px solid #313845;
  position: sticky; top: 0; background: #252a35; z-index: 1; border-radius: 12px 12px 0 0;
}
#modal .modal-header h2 { font-size: 18px; font-weight: 700; color: #fff; }
#modal .modal-close { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
#modal .modal-close:hover { color: #fff; background: #313845; }
#modal .modal-body { padding: 20px 24px; }
#modal .modal-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
#modal .modal-tag { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
#modal .modal-tag.type { background: #1a1e27; color: #76acf7; }
#modal .modal-tag.count { background: #1a1e27; color: #f59e0b; }
#modal .modal-tag.event { background: #1a1e27; color: #22c55e; }
#modal .modal-section { margin-bottom: 16px; }
#modal .modal-section h3 { font-size: 13px; font-weight: 600; color: #76acf7; margin-bottom: 8px; }
#modal .modal-url { color: #1063e2; text-decoration: none; font-size: 13px; }
#modal .modal-url:hover { text-decoration: underline; }
#modal .field-list { display: flex; flex-wrap: wrap; gap: 6px; }
#modal .field-chip { padding: 3px 8px; background: #1a1e27; border: 1px solid #3d4451; border-radius: 4px; font-size: 11px; color: #ccc; font-family: 'Inter', monospace; }
#modal .source-group { margin-bottom: 10px; }
#modal .source-group-header { font-size: 12px; font-weight: 600; color: #e0e0e0; margin-bottom: 4px; }
#modal .source-page { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 11px; }
#modal .source-page a { color: #76acf7; text-decoration: none; }
#modal .source-page a:hover { text-decoration: underline; }
#modal .source-page .cta-label { color: #f59e0b; font-size: 10px; }
#modal .modal-open-btn {
  display: inline-block; margin-top: 12px; padding: 8px 20px; border-radius: 6px;
  background: #1063e2; color: #fff; text-decoration: none; font-size: 13px; font-weight: 600;
  transition: background 0.2s;
}
#modal .modal-open-btn:hover { background: #0b56c6; }

.node { cursor: pointer; }
.node circle { transition: all 0.15s; }
.node:hover circle { filter: brightness(1.3); }
.node text { font-size: 11px; fill: #ccc; pointer-events: none; font-family: 'Inter', sans-serif; }
.node text.count-label { font-size: 9px; fill: #888; }
.node text.expand-icon { font-size: 10px; fill: #fff; font-weight: bold; pointer-events: none; }
.node text.link-icon { font-size: 11px; fill: #76acf7; pointer-events: all; cursor: pointer; opacity: 0; transition: opacity 0.15s; }
.node:hover text.link-icon { opacity: 1; }

.link { fill: none; stroke-opacity: 0.25; }
.link.tree-link { stroke: #3d4451; stroke-width: 1.2; }
.link.internal-link { stroke: #1063e2; stroke-width: 0.8; stroke-dasharray: 4,3; stroke-opacity: 0.15; }
.link.cta-link { stroke: #f59e0b; stroke-width: 1.2; stroke-dasharray: 6,3; stroke-opacity: 0.25; }
.link.nav-link { stroke: #76acf7; stroke-width: 0.6; stroke-dasharray: 2,3; stroke-opacity: 0.1; }

.conversion-node rect { cursor: pointer; transition: all 0.15s; }
.conversion-node:hover rect { filter: brightness(1.2); }
.conversion-node.active-filter rect { stroke: #f59e0b; stroke-width: 2.5; filter: brightness(1.15); }
.conversion-node text { font-family: 'Inter', sans-serif; pointer-events: none; }

.conversion-link { fill: none; stroke: #1063e2; stroke-width: 0.8; stroke-dasharray: 6,4; stroke-opacity: 0.08; }
.conversion-link.highlighted { stroke: #f59e0b; stroke-width: 1.2; stroke-opacity: 0.5; }

.highlight .link.internal-link, .highlight .link.cta-link { stroke-opacity: 0.8; }
</style>
</head>
<body>

<div id="controls">
  <div class="logo-area">
    <svg width="130" height="20" viewBox="0 0 130 20" xmlns="http://www.w3.org/2000/svg"><text x="0" y="15" font-family="Inter, sans-serif" font-weight="700" font-size="16" fill="#ffffff" letter-spacing="-0.5">RudderStack</text></svg>
    <span class="site-map-label">Site Map</span>
  </div>
  <input id="search-box" type="text" placeholder="Search pages... (e.g. 'product', 'blog')">
  <button class="toggle-btn active" id="btn-tree">Tree Links<span class="btn-tip tip-right">Toggle the parent–child tree lines that show the URL hierarchy. These are the solid grey lines connecting nodes.</span></button>
  <button class="toggle-btn" id="btn-internal">Internal Links<span class="btn-tip tip-left">Show dashed blue lines for all internal &lt;a&gt; links found on crawled pages. Links only appear between nodes that are both visible — expand branches to reveal more connections.</span></button>
  <button class="toggle-btn" id="btn-ctas">CTA Links<span class="btn-tip">Show dashed amber lines for call-to-action links (buttons, "Get Started", "Request Demo", etc.). Links only appear between visible nodes — expand branches to see more.</span></button>
  <button class="toggle-btn" id="btn-nav">Nav Links<span class="btn-tip">Show faint dashed lines for links inside &lt;nav&gt; elements (header/footer menus). Links only appear between visible nodes — expand branches to see more.</span></button>
  <button class="toggle-btn" id="btn-conversion">Conversion Layer<span class="btn-tip">Show the 5 key conversion endpoints (Signup, Demo, Quote, Contact, Interactive Demo) as cards to the right of the tree, with lines showing which pages link to them. Click a card for details.</span></button>
  <button class="toggle-btn" id="btn-expand-all">Expand All (L2)<span class="btn-tip tip-right">Expand the tree to show the first two levels of the URL hierarchy. Deeper nodes stay collapsed to keep things manageable.</span></button>
  <button class="toggle-btn" id="btn-collapse">Collapse All<span class="btn-tip tip-left">Collapse the entire tree back to just the root node.</span></button>
  <button class="toggle-btn" id="btn-fit">Zoom to Fit<span class="btn-tip">Reset zoom and pan so the entire visible tree fits on screen.</span></button>
  <span class="stats" id="stats-text"></span>
</div>

<div id="filter-badge">Filtered by: <span id="filter-name"></span> &times;</div>

<div id="legend">
  <h3>Legend</h3>
  <div class="legend-item"><span class="legend-dot" style="background: #1063e2"></span> Crawled page (with data)</div>
  <div class="legend-item"><span class="legend-dot" style="background: #76acf7"></span> Sitemap page (not crawled)</div>
  <div class="legend-item"><span class="legend-dot" style="background: #f59e0b"></span> Page with CTAs</div>
  <div class="legend-item"><span style="display:inline-block;width:30px;border-top:2px solid #3d4451">&nbsp;</span> Tree structure</div>
  <div class="legend-item"><span style="display:inline-block;width:30px;border-top:2px dashed #1063e2">&nbsp;</span> Internal link</div>
  <div class="legend-item"><span style="display:inline-block;width:30px;border-top:2px dashed #f59e0b">&nbsp;</span> CTA link</div>
  <div class="legend-item"><span style="display:inline-block;width:30px;border-top:2px dashed #76acf7">&nbsp;</span> Navigation link</div>
  <div class="legend-item" id="legend-conversion" style="display:none"><span class="legend-dot" style="background: #0b56c6; border-radius: 3px;"></span> Conversion endpoint</div>
  <div class="legend-item" id="legend-conversion-link" style="display:none"><span style="display:inline-block;width:30px;border-top:2px dashed #1063e2;opacity:0.5">&nbsp;</span> Conversion path</div>
</div>

<div id="tooltip"></div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<svg id="diagram"></svg>

<script>
// Load data and render
fetch('diagram_data.json?v=' + Date.now()).then(r => r.json()).then(DATA => {

const stats = DATA.stats;
document.getElementById('stats-text').textContent =
  `${stats.total_pages.toLocaleString()} pages | ${stats.pages_crawled} crawled | ${stats.total_links.toLocaleString()} links | ${stats.total_ctas} CTAs`;

// ============================================================
// TREE LAYOUT
// ============================================================
const width = window.innerWidth;
const height = window.innerHeight;
const margin = { top: 80, right: 40, bottom: 40, left: 200 };

const svg = d3.select("#diagram")
  .attr("width", width)
  .attr("height", height);

const g = svg.append("g").attr("class", "main-group");

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.05, 4])
  .on("zoom", (event) => {
    g.attr("transform", event.transform);
  });
svg.call(zoom);

// Initial transform
svg.call(zoom.transform, d3.zoomIdentity.translate(margin.left, height / 2).scale(0.6));

// Process tree data — collapse large branches by default
const root = d3.hierarchy(DATA.tree);

root.descendants().forEach(d => {
  d._allChildren = d.children;
  if (d.depth >= 1) {
    d._collapsed = true;
    d.children = null;
  }
});

const nodeHeight = 22;
const treeLayout = d3.tree().nodeSize([nodeHeight, 220]);

// Path lookup for link edges
const pathToNode = {};

function updatePathLookup() {
  root.descendants().forEach(d => {
    pathToNode[d.data.path] = d;
  });
}

// ============================================================
// ZOOM TO FIT
// ============================================================
function zoomToFit(animated) {
  const nodes = root.descendants();
  if (nodes.length === 0) return;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(d => {
    minX = Math.min(minX, d.x);
    maxX = Math.max(maxX, d.x);
    minY = Math.min(minY, d.y);
    maxY = Math.max(maxY, d.y);
  });
  const rightPad = showConversion ? 550 : 100;
  const padding = 100;
  const treeWidth = maxY - minY + padding + rightPad;
  const treeHeight = maxX - minX + padding * 2;
  const w = window.innerWidth;
  const h = window.innerHeight;
  const scaleX = w / treeWidth;
  const scaleY = (h - 80) / treeHeight;
  const scale = Math.min(scaleX, scaleY, 1.5);
  const centerX = (minY + maxY) / 2 + (showConversion ? 150 : 0);
  const centerY = (minX + maxX) / 2;
  const t = d3.zoomIdentity.translate(w / 2, h / 2).scale(scale).translate(-centerX, -centerY);
  if (animated) {
    svg.transition().duration(750).call(zoom.transform, t);
  } else {
    svg.call(zoom.transform, t);
  }
}

// ============================================================
// RENDER
// ============================================================
const linkGroup = g.append("g").attr("class", "links");
const internalLinkGroup = g.append("g").attr("class", "internal-links");
const nodeGroup = g.append("g").attr("class", "nodes");
const conversionLinkGroup = g.append("g").attr("class", "conversion-links");
const conversionGroup = g.append("g").attr("class", "conversion-nodes");

// Toggle states
let showTree = true, showInternal = false, showCTAs = false, showNav = false, showConversion = false;

// Conversion filter state
let activeConvFilter = null;

// Double-click timer
let clickTimer = null;

function update(source) {
  treeLayout(root);
  updatePathLookup();

  const nodes = root.descendants();
  const links = root.links();
  const duration = 400;

  // ---- TREE LINKS ----
  const treeLink = linkGroup.selectAll(".tree-link")
    .data(links, d => d.target.data.path);

  treeLink.exit().transition().duration(duration).attr("opacity", 0).remove();

  const treeLinkEnter = treeLink.enter().append("path")
    .attr("class", "link tree-link")
    .attr("opacity", 0);

  treeLink.merge(treeLinkEnter)
    .transition().duration(duration)
    .attr("opacity", showTree ? 1 : 0)
    .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

  // ---- NODES ----
  const node = nodeGroup.selectAll(".node")
    .data(nodes, d => d.data.path);

  node.exit().transition().duration(duration).attr("opacity", 0).remove();

  const nodeEnter = node.enter().append("g")
    .attr("class", "node")
    .attr("transform", d => `translate(${source ? source.y : d.y},${source ? source.x : d.x})`)
    .attr("opacity", 0);

  nodeEnter.append("circle");
  nodeEnter.append("text").attr("class", "expand-icon").attr("text-anchor", "middle").attr("dy", "0.35em");
  nodeEnter.append("text").attr("dy", "0.35em").attr("class", "label");
  nodeEnter.append("text").attr("class", "count-label").attr("dy", "0.35em");
  nodeEnter.append("text").attr("class", "link-icon").attr("dy", "0.35em").text("\u2197");

  const nodeUpdate = node.merge(nodeEnter);

  nodeUpdate.transition().duration(duration)
    .attr("transform", d => `translate(${d.y},${d.x})`)
    .attr("opacity", 1);

  // Click handler — single click to expand/collapse, double click to open URL
  nodeUpdate.on("click", (event, d) => {
    if (event.target.classList && event.target.classList.contains("link-icon")) return;
    if (clickTimer) {
      clearTimeout(clickTimer);
      clickTimer = null;
      window.open("https://www.rudderstack.com" + d.data.path, "_blank");
    } else {
      clickTimer = setTimeout(() => {
        clickTimer = null;
        if (d._allChildren) {
          if (d._collapsed) { d.children = d._allChildren; d._collapsed = false; }
          else { d.children = null; d._collapsed = true; }
          update(d);
        }
      }, 250);
    }
  });

  nodeUpdate.select(".link-icon").on("click", (event, d) => {
    event.stopPropagation();
    window.open("https://www.rudderstack.com" + d.data.path, "_blank");
  });

  nodeUpdate.select("circle")
    .attr("r", d => { if (d.depth === 0) return 8; const total = d.data.total_urls || 1; return Math.max(4, Math.min(12, Math.sqrt(total) * 1.2)); })
    .attr("fill", d => { if (d.data.ctas && d.data.ctas.length > 0) return "#f59e0b"; if (d.data.has_crawl_data) return "#1063e2"; return "#76acf7"; })
    .attr("stroke", d => d._collapsed && d._allChildren ? "#aaa" : "none")
    .attr("stroke-width", 2);

  nodeUpdate.select(".expand-icon").text(d => { if (!d._allChildren || d._allChildren.length === 0) return ""; return d._collapsed ? "+" : ""; });

  nodeUpdate.select(".label")
    .attr("x", d => (d._collapsed && d._allChildren) || !d.children ? 14 : -14)
    .attr("text-anchor", d => (d._collapsed && d._allChildren) || !d.children ? "start" : "end")
    .text(d => { let name = d.data.name; if (name.length > 35) name = name.substring(0, 32) + "..."; return name; });

  nodeUpdate.select(".count-label")
    .attr("x", d => { const mainX = (d._collapsed && d._allChildren) || !d.children ? 14 : -14; const labelLen = Math.min(35, d.data.name.length) * 6.5; return (d._collapsed && d._allChildren) || !d.children ? mainX + labelLen + 4 : mainX - labelLen - 4; })
    .attr("text-anchor", d => (d._collapsed && d._allChildren) || !d.children ? "start" : "end")
    .text(d => { if (d.data.total_urls > 1) return `(${d.data.total_urls.toLocaleString()})`; return ""; });

  nodeUpdate.select(".link-icon")
    .attr("x", d => { const mainX = (d._collapsed && d._allChildren) || !d.children ? 14 : -14; const labelLen = Math.min(35, d.data.name.length) * 6.5; const countLen = d.data.total_urls > 1 ? String(d.data.total_urls.toLocaleString()).length * 6 + 14 : 0; return (d._collapsed && d._allChildren) || !d.children ? mainX + labelLen + countLen + 8 : mainX - labelLen - countLen - 8; });

  nodeUpdate
    .on("mouseover", (event, d) => showTooltip(event, d))
    .on("mousemove", (event) => moveTooltip(event))
    .on("mouseout", hideTooltip);

  // ---- INTERNAL LINKS ----
  updateInternalLinks();

  // ---- CONVERSION LAYER ----
  if (showConversion) updateConversionLayer();

  // Re-apply filter if active
  if (activeConvFilter) applyConvFilter(activeConvFilter);

  // ---- AUTO-FIT ----
  const visibleCount = root.descendants().length;
  if (visibleCount <= 200) {
    setTimeout(() => zoomToFit(true), duration + 100);
  }
}

function updateInternalLinks() {
  const visibleEdges = DATA.edges.filter(e => {
    const sNode = pathToNode[e.source];
    const tNode = pathToNode[e.target];
    if (!sNode || !tNode) return false;
    if (!showInternal && !showCTAs && !showNav) return false;
    if (e.is_cta && !showCTAs) return false;
    if (e.is_nav && !e.is_cta && !showNav) return false;
    if (!e.is_cta && !e.is_nav && !showInternal) return false;
    return true;
  });

  const iLink = internalLinkGroup.selectAll(".edge-link")
    .data(visibleEdges, d => d.source + "->" + d.target);
  iLink.exit().transition().duration(300).attr("opacity", 0).remove();
  const iLinkEnter = iLink.enter().append("path")
    .attr("class", d => { if (d.is_cta) return "link edge-link cta-link"; if (d.is_nav) return "link edge-link nav-link"; return "link edge-link internal-link"; })
    .attr("opacity", 0);
  iLink.merge(iLinkEnter).transition().duration(400).attr("opacity", 1)
    .attr("d", d => { const s = pathToNode[d.source]; const t = pathToNode[d.target]; if (!s || !t) return ""; const sx = s.y, sy = s.x, tx = t.y, ty = t.x; const mx = (sx + tx) / 2; return `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`; });
}

// ============================================================
// CONVERSION LAYER
// ============================================================
function updateConversionLayer() {
  const endpoints = DATA.conversion_endpoints || [];
  if (!endpoints.length) return;

  const nodes = root.descendants();
  let maxY = 0, minX = Infinity, maxX = -Infinity;
  nodes.forEach(d => { maxY = Math.max(maxY, d.y); minX = Math.min(minX, d.x); maxX = Math.max(maxX, d.x); });
  const convX = maxY + 400;

  const treeMidX = (minX + maxX) / 2;
  const totalHeight = endpoints.length * 80;
  const startY = treeMidX - totalHeight / 2;

  // Render conversion nodes
  const convNode = conversionGroup.selectAll(".conversion-node").data(endpoints, d => d.id);
  convNode.exit().remove();

  const convEnter = convNode.enter().append("g")
    .attr("class", "conversion-node")
    .attr("transform", (d, i) => `translate(${convX}, ${startY + i * 80})`);

  convEnter.append("rect")
    .attr("x", -80).attr("y", -22).attr("width", 160).attr("height", 44)
    .attr("rx", 8).attr("ry", 8)
    .attr("fill", "#0b56c6").attr("stroke", "#1063e2").attr("stroke-width", 1.5);

  convEnter.append("text")
    .attr("text-anchor", "middle").attr("dy", "-0.15em")
    .attr("fill", "#fff").attr("font-size", "12px").attr("font-weight", "600")
    .text(d => d.name);

  convEnter.append("text")
    .attr("text-anchor", "middle").attr("dy", "1.2em")
    .attr("fill", "#76acf7").attr("font-size", "10px")
    .text(d => `${d.source_count} source pages`);

  // Update positions
  convNode.merge(convEnter)
    .transition().duration(400)
    .attr("transform", (d, i) => `translate(${convX}, ${startY + i * 80})`);

  // Active filter styling
  conversionGroup.selectAll(".conversion-node")
    .classed("active-filter", d => activeConvFilter && activeConvFilter.id === d.id);

  // Events on conversion nodes
  conversionGroup.selectAll(".conversion-node")
    .on("mouseover", (event, d) => showConversionTooltip(event, d))
    .on("mousemove", (event) => moveTooltip(event))
    .on("mouseout", hideTooltip)
    .on("click", (event, d) => {
      event.stopPropagation();
      // Toggle filter
      if (activeConvFilter && activeConvFilter.id === d.id) {
        clearConvFilter();
      } else {
        applyConvFilter(d);
      }
      // Show modal
      showConversionModal(d);
    });

  // Render conversion links
  const convLinks = [];
  endpoints.forEach((ep, i) => {
    const epY = startY + i * 80;
    (ep.source_pages || []).forEach(sp => {
      const path = sp.path.endsWith("/") ? sp.path : sp.path + "/";
      const sourceNode = pathToNode[path];
      if (sourceNode) {
        convLinks.push({ sourceX: sourceNode.y, sourceY: sourceNode.x, targetX: convX - 80, targetY: epY, epId: ep.id, sourcePath: path });
      }
    });
  });

  const cLink = conversionLinkGroup.selectAll(".conversion-link").data(convLinks, d => d.sourcePath + "->" + d.epId);
  cLink.exit().transition().duration(300).attr("opacity", 0).remove();
  const cLinkEnter = cLink.enter().append("path").attr("class", "conversion-link").attr("opacity", 0);
  cLink.merge(cLinkEnter).transition().duration(400).attr("opacity", 1)
    .attr("d", d => {
      // Offset control-point X slightly per link so curves don't all overlap into one vertical line
      const base = (d.sourceX + d.targetX) / 2;
      const spread = ((d.sourceY + d.targetY) % 120) - 60;  // ±60px jitter
      const mx = base + spread * 0.4;
      return `M${d.sourceX},${d.sourceY} C${mx},${d.sourceY} ${mx},${d.targetY} ${d.targetX},${d.targetY}`;
    });

  // Highlight conversion links if filter is active
  if (activeConvFilter) {
    conversionLinkGroup.selectAll(".conversion-link")
      .classed("highlighted", d => d.epId === activeConvFilter.id);
  }
}

function clearConversionLayer() {
  conversionGroup.selectAll("*").remove();
  conversionLinkGroup.selectAll("*").remove();
}

// ============================================================
// CONVERSION FILTER
// ============================================================
function applyConvFilter(endpoint) {
  activeConvFilter = endpoint;
  const sourcePaths = new Set((endpoint.source_pages || []).map(sp => {
    const p = sp.path;
    return p.endsWith("/") ? p : p + "/";
  }));

  // Dim non-matching tree nodes
  nodeGroup.selectAll(".node").each(function(d) {
    const match = sourcePaths.has(d.data.path);
    d3.select(this).select("circle").transition().duration(300).attr("opacity", match ? 1 : 0.12);
    d3.select(this).selectAll("text").transition().duration(300).attr("opacity", match ? 1 : 0.12);
  });

  // Highlight matching conversion links
  conversionLinkGroup.selectAll(".conversion-link")
    .classed("highlighted", d => d.epId === endpoint.id);

  // Highlight active card
  conversionGroup.selectAll(".conversion-node")
    .classed("active-filter", d => d.id === endpoint.id);

  // Show badge
  const badge = document.getElementById("filter-badge");
  document.getElementById("filter-name").textContent = endpoint.name;
  badge.style.display = "block";
  // Position badge below controls
  const controlsH = document.getElementById("controls").offsetHeight;
  badge.style.top = (controlsH + 8) + "px";
}

function clearConvFilter() {
  activeConvFilter = null;

  // Restore all node opacity
  nodeGroup.selectAll(".node circle").transition().duration(300).attr("opacity", 1);
  nodeGroup.selectAll(".node text").transition().duration(300).attr("opacity", 1);

  // Remove link highlights
  conversionLinkGroup.selectAll(".conversion-link").classed("highlighted", false);
  conversionGroup.selectAll(".conversion-node").classed("active-filter", false);

  // Hide badge
  document.getElementById("filter-badge").style.display = "none";
}

// Badge click to clear filter
document.getElementById("filter-badge").addEventListener("click", () => {
  clearConvFilter();
});

// ============================================================
// MODAL
// ============================================================
const modalOverlay = document.getElementById("modal-overlay");

function showConversionModal(endpoint) {
  document.getElementById("modal-title").textContent = endpoint.name;

  const url = endpoint.url.startsWith("http") ? endpoint.url : "https://www.rudderstack.com" + endpoint.url;

  let html = "";

  // Meta tags
  html += `<div class="modal-meta">`;
  html += `<span class="modal-tag type">${endpoint.type}</span>`;
  html += `<span class="modal-tag count">${endpoint.source_count} source pages</span>`;
  if (endpoint.tracking_event) {
    html += `<span class="modal-tag event">${endpoint.tracking_event}</span>`;
  }
  if (endpoint.form_id) {
    html += `<span class="modal-tag" style="background:#1a1e27; color:#76acf7;">form_id: ${endpoint.form_id}</span>`;
  }
  html += `</div>`;

  // URL
  html += `<div class="modal-section"><h3>Endpoint URL</h3><a class="modal-url" href="${url}" target="_blank">${url} &nearr;</a></div>`;

  // Form fields
  if (endpoint.form_fields && endpoint.form_fields.length > 0) {
    html += `<div class="modal-section"><h3>Form Fields</h3><div class="field-list">`;
    endpoint.form_fields.forEach(f => { html += `<span class="field-chip">${f}</span>`; });
    html += `</div></div>`;
  }

  // Tracking
  if (endpoint.tracking_event) {
    html += `<div class="modal-section"><h3>Tracking</h3>`;
    html += `<div style="color:#22c55e; font-size:13px;"><strong>Event:</strong> ${endpoint.tracking_event}</div>`;
    if (endpoint.form_id) {
      html += `<div style="color:#76acf7; font-size:13px; margin-top:4px;"><strong>form_id:</strong> <code style="background:#1a1e27; padding:2px 6px; border-radius:3px; font-family:monospace;">${endpoint.form_id}</code></div>`;
    }
    if (endpoint.tracking_detail) {
      html += `<div style="color:#888; font-size:12px; margin-top:4px;">${endpoint.tracking_detail}</div>`;
    }
    html += `</div>`;
  }

  // Source pages grouped by directory
  if (endpoint.source_pages && endpoint.source_pages.length > 0) {
    html += `<div class="modal-section"><h3>Source Pages (${endpoint.source_pages.length})</h3>`;

    // Group by first path segment
    const groups = {};
    endpoint.source_pages.forEach(sp => {
      const parts = sp.path.replace(/^\//, "").split("/");
      const dir = "/" + (parts[0] || "") + "/";
      if (!groups[dir]) groups[dir] = [];
      groups[dir].push(sp);
    });

    // Sort groups by count descending
    const sortedGroups = Object.entries(groups).sort((a, b) => b[1].length - a[1].length);

    sortedGroups.forEach(([dir, pages]) => {
      html += `<div class="source-group">`;
      html += `<div class="source-group-header">${dir} <span style="color:#76acf7; font-weight:400;">(${pages.length} page${pages.length > 1 ? "s" : ""})</span></div>`;

      // If many pages in directory, show summary + first few
      const showLimit = pages.length > 6 ? 4 : pages.length;
      pages.slice(0, showLimit).forEach(sp => {
        const pageUrl = "https://www.rudderstack.com" + sp.path;
        html += `<div class="source-page">`;
        html += `<a href="${pageUrl}" target="_blank">${sp.path}</a>`;
        if (sp.cta_text) html += `<span class="cta-label">"${sp.cta_text}"</span>`;
        html += `</div>`;
      });
      if (pages.length > showLimit) {
        html += `<div style="font-size:10px; color:#666; margin-top:2px; padding-left:4px;">...and ${pages.length - showLimit} more in ${dir}</div>`;
      }
      html += `</div>`;
    });

    html += `</div>`;
  }

  // Open button
  html += `<a class="modal-open-btn" href="${url}" target="_blank">Open ${endpoint.name} &nearr;</a>`;

  document.getElementById("modal-body").innerHTML = html;
  modalOverlay.classList.add("visible");
}

function closeModal() {
  modalOverlay.classList.remove("visible");
}

document.getElementById("modal-close").addEventListener("click", closeModal);
modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

// ============================================================
// TOOLTIP
// ============================================================
const tooltip = document.getElementById("tooltip");

function showTooltip(event, d) {
  let html = `<h4>${d.data.name}</h4>`;
  html += `<div class="url">${d.data.path}</div>`;
  html += `<div><strong>Pages:</strong> ${d.data.total_urls.toLocaleString()} total, ${d.data.url_count} direct</div>`;

  if (d._collapsed && d._allChildren) {
    html += `<div style="color:#888; margin-top:4px;">Click to expand ${d._allChildren.length} children</div>`;
  }

  if (d.data.has_crawl_data) {
    html += `<div style="margin-top:4px;"><strong>Links found:</strong> ${d.data.link_count || 0}</div>`;
  }

  const consolidated = d.data.consolidated_ctas;
  if (consolidated && consolidated.length > 0) {
    html += `<div class="cta-list"><strong>CTAs (consolidated):</strong>`;
    const maxShow = 10;
    consolidated.slice(0, maxShow).forEach(cta => {
      html += `<div class="cta-item"><span class="cta-text">${cta.text || "(no text)"}</span>`;
      if (cta.count > 1) html += ` <span class="cta-count">(${cta.count} pages)</span>`;
      html += `<br>`;
      if (cta.href) html += `<span class="cta-target">&rarr; ${cta.href}</span>`;
      else if (cta.hrefs) html += `<span class="cta-target">&rarr; ${cta.hrefs.join(", ")}</span>`;
      else if (cta.href_sample) html += `<span class="cta-target">&rarr; ${cta.unique_targets} different targets (e.g. ${cta.href_sample[0]})</span>`;
      html += `</div>`;
    });
    if (consolidated.length > maxShow) html += `<div style="color:#888; font-size:10px; margin-top:4px;">...and ${consolidated.length - maxShow} more CTA types</div>`;
    html += `</div>`;
  } else if (d.data.ctas && d.data.ctas.length > 0) {
    html += `<div class="cta-list"><strong>CTAs (${d.data.ctas.length}):</strong>`;
    d.data.ctas.forEach(cta => {
      html += `<div class="cta-item"><span class="cta-text">${cta.text || "(no text)"}</span><br><span class="cta-target">&rarr; ${cta.href}</span></div>`;
    });
    html += `</div>`;
  }

  html += `<div style="color:#555; font-size:10px; margin-top:8px;">Double-click to open URL</div>`;
  tooltip.innerHTML = html;
  tooltip.style.display = "block";
  moveTooltip(event);
}

function showConversionTooltip(event, d) {
  let html = `<h4>${d.name}</h4>`;
  html += `<div class="url">${d.url}</div>`;
  html += `<div><strong>Type:</strong> ${d.type} | <strong>Sources:</strong> ${d.source_count}</div>`;
  if (d.tracking_event) {
    html += `<div style="color:#22c55e; margin-top:4px;"><strong>Event:</strong> ${d.tracking_event}`;
    if (d.form_id) html += ` <span style="color:#76acf7;">(form_id: ${d.form_id})</span>`;
    html += `</div>`;
  }
  html += `<div style="color:#555; font-size:10px; margin-top:8px;">Click for details &amp; to filter tree</div>`;
  tooltip.innerHTML = html;
  tooltip.style.display = "block";
  moveTooltip(event);
}

function moveTooltip(event) {
  let x = event.clientX + 16;
  let y = event.clientY + 16;
  if (x + 480 > window.innerWidth) x = event.clientX - 490;
  if (y + 300 > window.innerHeight) y = event.clientY - 300;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
}

function hideTooltip() { tooltip.style.display = "none"; }

// ============================================================
// CONTROLS
// ============================================================
function toggleBtn(id, getter, setter) {
  document.getElementById(id).addEventListener("click", () => {
    setter(!getter());
    document.getElementById(id).classList.toggle("active");
    if (id === "btn-tree") {
      linkGroup.selectAll(".tree-link").transition().duration(300).attr("opacity", showTree ? 1 : 0);
    } else if (id === "btn-conversion") {
      document.getElementById("legend-conversion").style.display = showConversion ? "" : "none";
      document.getElementById("legend-conversion-link").style.display = showConversion ? "" : "none";
      if (showConversion) {
        updateConversionLayer();
      } else {
        clearConversionLayer();
        clearConvFilter();
      }
    } else {
      updateInternalLinks();
    }
  });
}

toggleBtn("btn-tree", () => showTree, v => showTree = v);
toggleBtn("btn-internal", () => showInternal, v => showInternal = v);
toggleBtn("btn-ctas", () => showCTAs, v => showCTAs = v);
toggleBtn("btn-nav", () => showNav, v => showNav = v);
toggleBtn("btn-conversion", () => showConversion, v => showConversion = v);

// Expand all to level 2
document.getElementById("btn-expand-all").addEventListener("click", () => {
  root.descendants().forEach(d => { if (d.depth < 2 && d._allChildren) { d.children = d._allChildren; d._collapsed = false; } });
  update(root);
});

// Collapse all
document.getElementById("btn-collapse").addEventListener("click", () => {
  root.descendants().forEach(d => { if (d.depth >= 1 && d._allChildren) { d.children = null; d._collapsed = true; } });
  update(root);
});

// Zoom to Fit button
document.getElementById("btn-fit").addEventListener("click", () => zoomToFit(true));

// Search
const searchBox = document.getElementById("search-box");
searchBox.addEventListener("input", () => {
  const query = searchBox.value.toLowerCase().trim();
  if (!query) {
    nodeGroup.selectAll(".node circle").attr("opacity", 1);
    nodeGroup.selectAll(".node text").attr("opacity", 1);
    return;
  }
  nodeGroup.selectAll(".node").each(function(d) {
    const match = d.data.name.toLowerCase().includes(query) || d.data.path.toLowerCase().includes(query);
    d3.select(this).select("circle").attr("opacity", match ? 1 : 0.15);
    d3.select(this).selectAll("text").attr("opacity", match ? 1 : 0.15);
  });
});

// ============================================================
// INITIAL RENDER
// ============================================================
root.descendants().forEach(d => {
  if (d.depth < 1 && d._allChildren) { d.children = d._allChildren; d._collapsed = false; }
});

update(root);

window.addEventListener("resize", () => {
  svg.attr("width", window.innerWidth).attr("height", window.innerHeight);
});

}); // end fetch
</script>
